<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0d0518;
  --bg2:#120720;
  --surface:#1a0d2e;
  --surface2:#221040;
  --surface3:#2a1550;
  --pink:#e040fb;
  --pink2:#f06292;
  --purple:#7c3aed;
  --purple2:#a855f7;
  --yellow:#ffd600;
  --text:#ffffff;
  --text2:#c4a8d4;
  --text3:#7a5a8a;
  --green:#00e676;
  --red:#ff4757;
  --border:rgba(224,64,251,0.15);
  --border2:rgba(255,255,255,0.07);
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;min-height:100vh;overflow-x:hidden;}
a{text-decoration:none;color:inherit;}

/* ── NAV ── */
nav{
  position:sticky;top:0;left:0;right:0;z-index:1000;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 40px;height:66px;
  background:rgba(13,5,24,0.97);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.nav-logo{font-family:'Tajawal',sans-serif;font-size:24px;font-weight:900;color:var(--text);letter-spacing:1px;}
.nav-logo span{color:var(--pink);}
.nav-links{display:flex;align-items:center;gap:4px;}
.nav-links a{padding:8px 16px;border-radius:6px;font-size:14px;font-weight:600;color:var(--text2);transition:.2s;}
.nav-links a:hover{color:var(--text);background:rgba(255,255,255,0.05);}
.nav-links a.active{color:var(--text);}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-icon-btn{
  width:40px;height:40px;display:flex;align-items:center;justify-content:center;
  border-radius:8px;color:var(--text2);transition:.2s;cursor:pointer;
  border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);
  position:relative;
}
.nav-icon-btn:hover{color:var(--text);border-color:var(--pink);background:rgba(224,64,251,0.08);}
.nav-badge{
  position:absolute;top:-6px;right:-6px;
  background:var(--pink);color:#fff;font-size:10px;font-weight:900;
  width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--bg);
}

/* ── HERO BANNER ── */
.profile-hero{
  height:220px;position:relative;overflow:hidden;
}
.hero-bg-layer{
  position:absolute;inset:0;
  background:linear-gradient(145deg,#0d0518 0%,#1a0535 50%,#0a0d28 100%);
}
.hero-grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(224,64,251,0.07) 1px,transparent 1px),
    linear-gradient(90deg,rgba(224,64,251,0.07) 1px,transparent 1px);
  background-size:50px 50px;
}
.hero-glow1{
  position:absolute;
  width:700px;height:500px;
  background:radial-gradient(ellipse,rgba(124,58,237,0.2) 0%,transparent 65%);
  top:-150px;left:50%;transform:translateX(-50%);
  pointer-events:none;
}
.hero-glow2{
  position:absolute;
  width:350px;height:350px;
  background:radial-gradient(ellipse,rgba(224,64,251,0.12) 0%,transparent 70%);
  bottom:-80px;right:15%;
  pointer-events:none;
}
.hero-glow3{
  position:absolute;
  width:200px;height:200px;
  background:radial-gradient(ellipse,rgba(168,85,247,0.1) 0%,transparent 70%);
  top:10%;left:10%;
  pointer-events:none;
}

/* floating particles */
.particle{
  position:absolute;border-radius:50%;pointer-events:none;
  animation:floatP 6s ease-in-out infinite;
}
.p1{width:8px;height:8px;background:rgba(224,64,251,0.4);top:30%;left:20%;animation-delay:0s;}
.p2{width:5px;height:5px;background:rgba(168,85,247,0.5);top:50%;left:40%;animation-delay:-2s;}
.p3{width:6px;height:6px;background:rgba(224,64,251,0.3);top:20%;left:70%;animation-delay:-4s;}
.p4{width:4px;height:4px;background:rgba(255,214,0,0.4);top:65%;left:80%;animation-delay:-1s;}
@keyframes floatP{0%,100%{transform:translateY(0);opacity:.6;}50%{transform:translateY(-14px);opacity:1;}}

/* ── WRAP ── */
.page-wrap{
  max-width:960px;margin:0 auto;
  padding:0 40px 80px;
}

/* ── PROFILE CARD ── */
.profile-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  margin-top:-52px;
  position:relative;z-index:2;
  padding:28px 32px;
  display:flex;align-items:center;gap:24px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5),0 0 0 1px rgba(224,64,251,0.06);
}

/* avatar */
.avatar-wrap{position:relative;flex-shrink:0;}
.avatar{
  width:92px;height:92px;border-radius:50%;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  border:3px solid var(--bg);
  display:flex;align-items:center;justify-content:center;
  font-family:'Tajawal',sans-serif;font-size:38px;font-weight:900;color:#fff;
  box-shadow:0 0 0 3px rgba(224,64,251,0.2),0 8px 24px rgba(224,64,251,0.2);
}
.avatar-ring{
  position:absolute;inset:-6px;border-radius:50%;
  border:2px solid rgba(224,64,251,0.25);
  animation:spinRing 8s linear infinite;
}
.avatar-ring::before{
  content:'';position:absolute;
  top:-3px;right:30%;
  width:8px;height:8px;border-radius:50%;
  background:var(--pink);
  box-shadow:0 0 8px rgba(224,64,251,0.8);
}
@keyframes spinRing{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

.avatar-status{
  position:absolute;bottom:4px;left:4px;
  width:16px;height:16px;border-radius:50%;
  background:var(--green);border:2px solid var(--surface);
  box-shadow:0 0 8px rgba(0,230,118,0.6);
}

/* profile info */
.profile-info{flex:1;min-width:0;}
.profile-name{
  font-family:'Tajawal',sans-serif;
  font-size:26px;font-weight:900;
  color:#fff;margin-bottom:4px;
}
.profile-email{font-size:14px;color:var(--text3);margin-bottom:12px;}
.profile-badges{display:flex;gap:8px;flex-wrap:wrap;}
.badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:20px;
  font-size:12px;font-weight:700;letter-spacing:.4px;
}
.badge-active{
  background:rgba(0,230,118,0.08);border:1px solid rgba(0,230,118,0.2);color:var(--green);
}
.badge-member{
  background:rgba(224,64,251,0.08);border:1px solid rgba(224,64,251,0.2);color:var(--pink);
}
.badge-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}

/* logout */
.logout-btn{
  background:rgba(255,71,87,0.07);border:1px solid rgba(255,71,87,0.2);
  color:var(--red);padding:11px 22px;border-radius:10px;
  font-size:14px;font-weight:700;font-family:'Cairo',sans-serif;
  cursor:pointer;transition:.25s;flex-shrink:0;
  display:flex;align-items:center;gap:8px;
}
.logout-btn:hover{
  background:rgba(255,71,87,0.14);border-color:rgba(255,71,87,0.4);
  transform:translateY(-1px);
}

/* ── STATS ── */
.stats-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:16px;margin-top:20px;
}
.stat-card{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:16px;padding:24px 20px;
  text-align:center;transition:.3s;
  position:relative;overflow:hidden;
}
.stat-card::before{
  content:'';position:absolute;
  top:-40px;left:50%;transform:translateX(-50%);
  width:100px;height:100px;border-radius:50%;
  background:radial-gradient(circle,rgba(224,64,251,0.08) 0%,transparent 70%);
  pointer-events:none;
}
.stat-card:hover{
  border-color:rgba(224,64,251,0.25);
  transform:translateY(-3px);
  box-shadow:0 12px 36px rgba(0,0,0,0.4);
}
.stat-icon{
  width:48px;height:48px;border-radius:12px;
  background:rgba(224,64,251,0.08);border:1px solid rgba(224,64,251,0.15);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 16px;color:var(--pink);
}
.stat-num{
  font-family:'Tajawal',sans-serif;font-size:34px;font-weight:900;
  background:linear-gradient(135deg,var(--purple2),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  display:block;margin-bottom:6px;line-height:1;
}
.stat-label{font-size:13px;color:var(--text3);font-weight:600;}

/* ── SECTION TITLE ── */
.section-title{
  font-family:'Tajawal',sans-serif;font-size:19px;font-weight:700;
  margin-bottom:16px;margin-top:28px;
  display:flex;align-items:center;gap:10px;color:#fff;
}
.section-title-bar{
  width:3px;height:20px;border-radius:2px;
  background:linear-gradient(var(--purple2),var(--pink));
  flex-shrink:0;
}

/* ── CARD INFO ── */
.info-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:14px;
}
.info-box{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:12px;padding:18px 20px;
  transition:.2s;
}
.info-box:hover{border-color:rgba(224,64,251,0.2);}
.info-box label{
  display:flex;align-items:center;gap:6px;
  font-size:11px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:var(--text3);margin-bottom:10px;
}
.info-box label svg{color:var(--pink);opacity:.7;}
.info-val{
  font-family:'Tajawal',sans-serif;font-size:18px;font-weight:700;
  color:var(--text);letter-spacing:.5px;
}
.info-val.blur{filter:blur(7px);transition:.2s;cursor:pointer;user-select:none;}
.info-val.blur:hover{filter:blur(0);}
.reveal-hint{
  font-size:11px;color:var(--text3);margin-top:6px;
  display:flex;align-items:center;gap:4px;
}

/* ── QUICK ACTIONS ── */
.actions-grid{
  display:grid;grid-template-columns:repeat(2,1fr);
  gap:14px;margin-top:4px;padding-bottom:20px;
}
.action-btn{
  padding:16px;border-radius:12px;
  border:1px solid var(--border2);background:var(--surface);
  color:var(--text2);font-size:14px;font-weight:700;
  font-family:'Cairo',sans-serif;cursor:pointer;transition:.25s;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.action-btn:hover{
  border-color:rgba(224,64,251,0.3);color:var(--text);
  background:rgba(224,64,251,0.05);
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(0,0,0,0.3);
}
.action-btn svg{color:var(--pink);}

/* ── FOOTER ── */
footer{
  background:var(--surface);border-top:1px solid var(--border2);
  padding:28px 40px;
  display:flex;align-items:center;justify-content:space-between;
}
.footer-logo{font-family:'Tajawal',sans-serif;font-size:18px;font-weight:900;color:var(--text2);letter-spacing:1px;}
.footer-logo span{color:var(--pink);}
.footer-copy{font-size:13px;color:var(--text3);}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  nav{padding:0 20px;}
  .page-wrap{padding:0 16px 60px;}
  .profile-card{flex-direction:column;align-items:flex-start;padding:20px;gap:16px;}
  .logout-btn{width:100%;justify-content:center;}
  .stats-grid{grid-template-columns:1fr 1fr;}
  .stats-grid .stat-card:last-child{grid-column:span 2;}
  .info-grid{grid-template-columns:1fr;}
  .actions-grid{grid-template-columns:1fr;}
  footer{flex-direction:column;gap:12px;text-align:center;padding:20px;}
}
</style>
</head>

<script>
const uid = localStorage.getItem("uid");
if(!uid){ location.href="auth.html"; }

// Cart badge
const cart = JSON.parse(localStorage.getItem("cart")||"[]");
const total = cart.reduce((s,i)=>s+(i.qty||1),0);
if(total > 0){
  const badge = document.getElementById("cartBadge");
  badge.textContent = total;
  badge.style.display = "flex";
}

// Load user data
db.ref("usersz8/"+uid).once("value").then(snap=>{
  const d = snap.val();
  if(!d) return;
  const name = d.username||"مستخدم";
  document.getElementById("profileName").textContent = name;
  document.getElementById("profileEmail").textContent = d.email||"—";
  document.getElementById("avatarEl").textContent = name[0].toUpperCase();

  const games = d.gamesOwned ? Object.keys(d.gamesOwned).length : 0;
  document.getElementById("gamesCount").textContent = games;

  // Blurred card info — click to reveal
  const cardEl = document.getElementById("cardNum");
  const cvvEl  = document.getElementById("cvvEl");
  const pinEl  = document.getElementById("pinEl");

  cardEl.setAttribute("data-real", d.cardNumber||"غير متوفر");
  cvvEl.setAttribute("data-real",  d.cvv||"—");
  pinEl.setAttribute("data-real",  d.pin||"—");

  [
    [cardEl, "••••-••••-••••-••••"],
    [cvvEl,  "•••"],
    [pinEl,  "••••"]
  ].forEach(([el, mask])=>{
    el.addEventListener("click",()=>{
      const revealed = !el.classList.contains("blur");
      if(revealed){
        el.classList.add("blur");
        el.textContent = mask;
      } else {
        el.classList.remove("blur");
        el.textContent = el.getAttribute("data-real");
      }
    });
  });
});

// Load balance
db.ref("users/"+uid).once("value").then(snap=>{
  const d = snap.val();
  if(d && d.balance !== undefined){
    document.getElementById("balanceEl").textContent = d.balance;
  }
}).catch(()=>{});

// Logout
document.getElementById("logoutBtn").addEventListener("click",()=>{
  localStorage.removeItem("uid");
  location.href="auth.html";
});
</script>
</body>
</html>
